{{ define "main" }}
{{ .Content }}

<h2>Последние статьи</h2>
<ul class="post-list">
{{ range first 5 (where .Site.RegularPages "Section" "blog") }}
<li>
    <span class="date">{{ .Date.Format "02.01.2006" }}</span>
    <a href="{{ .Permalink }}">{{ .Title }}</a>
</li>
{{ end }}
</ul>
<p><a href="/blog/">Все статьи →</a></p>

{{ end }}
